<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Sell Prices — 1.0.0 Ver.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f8fa;
    --card-bg: #ffffff;
    --border: #e8e8ec;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
    --text-primary: #1a1a2e;
    --text-secondary: #6b6b80;
    --text-muted: #9d9dae;
    --toggle-on: #2d2d3f;
    --toggle-off: #d4d4dc;
    --toggle-knob: #ffffff;
    --placeholder: #ececf0;
    --accent-green: #34d399;
    --accent-amber: #fbbf24;
    --tag-bg: #f0f0f4;
    --radius: 16px;
    --radius-sm: 10px;
    --warning-bg: #fef3c7;
    --warning-border: #f59e0b;
    --warning-text: #92400e;
    --error-bg: #fee2e2;
    --error-border: #ef4444;
    --error-text: #991b1b;
  }

  [data-theme="dark"] {
      --bg: #1a1a1a;
    --card-bg: #2a2a2a;
    --border: #333333;
    --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
    --text-primary: #f0f0f0;
    --text-secondary: #b8b8b8;
    --text-muted: #808080;
    --toggle-on: #4a4a4a;
    --toggle-off: #e0e0e0;
    --toggle-knob: #ffffff;
    --placeholder: #333333;
    --accent-green: #34d399;
    --accent-amber: #fbbf24;
    --tag-bg: #333333;
    --warning-bg: #3a3520;
    --warning-border: #b47a12;
    --warning-text: #f5c542;
    --error-bg: #3a2020;
    --error-border: #b53030;
    --error-text: #f08080;

}
[data-theme="dark"] table tbody tr[style] { background: #2a2a2a !important; }
[data-theme="dark"] .fish-name-rarity-common { color: #d1d5db; }
[data-theme="dark"] .fish-name-rarity-uncommon { color: #5db8e8; }
[data-theme="dark"] .fish-name-rarity-rare { color: #a78bfa; }
[data-theme="dark"] .fish-name-rarity-epic { color: #f472b6; }
[data-theme="dark"] .fish-name-rarity-legendary { color: #fbbf24; }
[data-theme="dark"] .fish-name-rarity-exotic {
  background: linear-gradient(90deg, #ff3b3b, #ff9f1c, #ffe14d, #2ed573, #1e90ff, #7d5fff, #ff4fd8);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
[data-theme="dark"] .fish-name-rarity-mystic { color: #f87171; }
[data-theme="dark"] .fish-name-rarity-mythic { color: #f87171; }
[data-theme="dark"] .rarity-exotic {
  background: linear-gradient(90deg, #ff3b3b, #ff9f1c, #ffe14d, #2ed573, #1e90ff, #7d5fff, #ff4fd8);
  color: #111827;
}
[data-theme="dark"] .rarity-mystic { background: #3e1a1a; color: #f87171; }
[data-theme="dark"] .rarity-uncommon { background: #1a2e3e; color: #5db8e8; }
[data-theme="dark"] .rarity-common { background: #2b2b2b; color: #d1d5db; }
[data-theme="dark"] .rarity-rare { background: #2a1e4e; color: #a78bfa; }
[data-theme="dark"] .rarity-epic { background: #3e1a2e; color: #f472b6; }
[data-theme="dark"] .rarity-legendary { background: #3e2e1a; color: #fbbf24; }
[data-theme="dark"] .rarity-mythic { background: #3e1a1a; color: #f87171; }
[data-theme="dark"] .upgrade-row:hover { background: #383838; }
[data-theme="dark"] .upgrade-row:hover .upgrade-label,
[data-theme="dark"] .upgrade-row:hover .upgrade-sub,
[data-theme="dark"] .upgrade-row:hover .upgrade-mult { color: #ffffff; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    -webkit-font-smoothing: antialiased;
  }

  .dashboard {
    width: 100%;
    max-width: 740px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
    margin-bottom: 4px;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header-badge {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-muted);
    background: var(--tag-bg); padding: 5px 12px; border-radius: 20px;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .card-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-muted); margin-bottom: 20px;
  }

  .banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
    animation: slideIn 0.25s ease-out;
  }
  .banner.visible { display: flex; }
  .banner.warning { background: var(--warning-bg); border: 1.5px solid var(--warning-border); }
  .banner.error { background: var(--error-bg); border: 1.5px solid var(--error-border); }
  .banner-icon { flex-shrink: 0; font-size: 14px; }
  .banner-text { font-size: 12.5px; font-weight: 500; line-height: 1.4; }
  .banner.warning .banner-text { color: var(--warning-text); }
  .banner.error .banner-text { color: var(--error-text); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .upgrades-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .upgrade-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .upgrade-row:hover { background: #ededf2; }
  .upgrade-row:active { transform: scale(0.985); }
  .upgrade-row.off-look .upgrade-label,
  .upgrade-row.off-look .upgrade-sub { color: var(--text-muted); }
  .upgrade-label { font-size: 13px; font-weight: 500; line-height: 1.2; transition: color 0.2s; }
  .upgrade-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; transition: color 0.2s; }
  .upgrade-mult {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    background: var(--tag-bg); padding: 1px 6px; border-radius: 4px;
    margin-top: 3px; display: inline-block;
  }

  .toggle {
    width: 38px; height: 22px; border-radius: 11px;
    position: relative; flex-shrink: 0; margin-left: 12px;
    transition: background 0.25s;
  }
  .toggle.on { background: var(--toggle-on); }
  .toggle.off { background: var(--toggle-off); }
  .toggle::after {
    content: ''; position: absolute; top: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--toggle-knob);
    box-shadow: 0 1px 2px rgba(0,0,0,0.12);
    transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .toggle.on::after { left: 19px; }
  .toggle.off::after { left: 3px; }

  .auras-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .aura-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
    transition: transform 0.15s;
  }
  .aura-item:hover { transform: translateY(-2px); }
  .aura-item:active { transform: scale(0.96); }
  .aura-thumb {
    width: 60px; height: 60px; border-radius: 5px;
    background: var(--placeholder); border: 2px dashed var(--border);
    transition: border-color 0.25s, box-shadow 0.25s;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: var(--text-muted);
  }
  .aura-item.active .aura-thumb {
    border-color: #059669; border-style: solid;
    box-shadow: 0 0 0 3px rgba(5,150,105,0.15);
  }
  .aura-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 5px;
  }
  .aura-thumb.has-img {
    border: 2px solid transparent;
    background: transparent;
    padding: 0;
    overflow: hidden;
  }
  .aura-item.active .aura-thumb.has-img {
    border: 2px solid #059669;
    box-shadow: 0 0 0 3px rgba(5,150,105,0.15);
  }
  .aura-name { font-size: 11.5px; font-weight: 500; text-align: center; line-height: 1.3; }
  .aura-mult { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-top: -6px; }
  .aura-status {
    display: inline-block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 2px 8px; border-radius: 20px; margin-top: -4px;
    transition: all 0.25s;
  }
  .aura-status.on-tag { color: #059669; background: #d1fae5; }
  .aura-status.off-tag { color: var(--text-muted); background: var(--tag-bg); }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .stat-block {
    background: var(--bg); border-radius: var(--radius-sm);
    padding: 20px 18px; text-align: center;
    transition: background 0.3s;
  }
  .stat-block.error-state { background: #fef2f2; }
  .stat-value {
    font-size: 32px; font-weight: 700; letter-spacing: -0.5px; line-height: 1;
    transition: color 0.3s;
  }
  .stat-value.error-val { font-size: 14px; font-weight: 600; color: var(--error-text); }
  .stat-decimal { font-size: 20px; font-weight: 500; color: var(--text-muted); }
  .stat-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-top: 8px; }
  .stat-icon {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle; position: relative; top: -1px;
  }
  .stat-formula {
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    margin-top: 6px; font-variant-numeric: tabular-nums;
  }
  .stat-value.pulse { animation: statPulse 0.3s ease-out; }
  @keyframes statPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
  thead th {
    font-size: 10.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-muted);
    padding: 0 8px 12px; text-align: center;
    border-bottom: 1.5px solid var(--border);
  }
  thead th:first-child { text-align: left; padding-left: 0; }
  tbody td {
    padding: 11px 8px; text-align: center; color: var(--text-secondary);
    font-variant-numeric: tabular-nums; border-bottom: 1px solid #e8e8ec;
    transition: color 0.3s;
  }
  tbody td:first-child { text-align: left; font-weight: 600; color: var(--text-primary); padding-left: 0; }
  tbody tr:last-child td { border-bottom: none; }

  .fish-qty-input {
    width: 72px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text-primary);
    text-align: center;
    font: inherit;
    font-size: 12px;
  }
  .fish-qty-input:focus {
    outline: none;
    border-color: #059669;
    box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.15);
  }

  .sell-tools {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
  }
  .bulk-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .bulk-btn {
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .bulk-btn:hover { background: var(--bg); }
  .sell-all-box {
    margin-left: auto;
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: right;
    min-width: 180px;
  }
  .sell-all-label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 700;
  }
  .sell-all-value {
    display: block;
    font-size: 20px;
    font-weight: 800;
    color: var(--text-primary);
    margin-top: 2px;
  }

  .fish-name { font-weight: 700; }
  .fish-name-rarity-common { color: #4b5563; }
  .fish-name-rarity-uncommon { color: #0369a1; }
  .fish-name-rarity-rare { color: #6d28d9; }
  .fish-name-rarity-epic { color: #be185d; }
  .fish-name-rarity-legendary { color: #b45309; }
  .fish-name-rarity-exotic {
    background: linear-gradient(90deg, #ff3b3b, #ff9f1c, #ffe14d, #2ed573, #1e90ff, #7d5fff, #ff4fd8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .fish-name-rarity-mystic { color: #b91c1c; }
  .fish-name-rarity-mythic { color: #b91c1c; }

  .rarity-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .rarity-common { background: #f3f4f6; color: #4b5563; }
  .rarity-uncommon { background: #e0f2fe; color: #0369a1; }
  .rarity-rare { background: #ede9fe; color: #6d28d9; }
  .rarity-epic { background: #fce7f3; color: #be185d; }
  .rarity-legendary { background: #fef3c7; color: #b45309; }
  .rarity-exotic {
    background: linear-gradient(90deg, #ff3b3b, #ff9f1c, #ffe14d, #2ed573, #1e90ff, #7d5fff, #ff4fd8);
    color: #111827;
  }
  .rarity-mystic { background: #fee2e2; color: #b91c1c; }
  .rarity-mythic { background: #fee2e2; color: #b91c1c; }

  @media (max-width: 640px) {
    .upgrades-grid { grid-template-columns: 1fr; }
    .auras-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-row { grid-template-columns: 1fr; }
    .stat-value { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="dashboard">

  <div class="header">
    <h1>Fish Sell Prices</h1>
    <div style="display:flex;align-items:center;gap:10px;">
  <div style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;" onclick="toggleTheme()">
    <span style="font-size:12px;font-weight:500;color:var(--text-muted);">Dark mode</span>
    <div class="toggle off" id="theme-toggle"></div>
  </div>
  <span class="header-badge">1.0.0 Ver.</span>
</div>
  </div>

  <div class="card">
    <div class="card-title">Upgrades &amp; Boosts</div>
    <div class="upgrades-grid" id="upgrades-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">Auras</div>
    <div class="banner warning" id="aura-warning">
      <div class="banner-icon">⚠️</div>
      <div class="banner-text">Multiple auras active — keep only <strong>one aura</strong> turned on at a time.</div>
    </div>

    <div class="auras-grid" id="auras-grid"></div>
  </div>

    <div class="card">
      <div class="card-title">Rods</div>
      <div class="banner warning" id="rod-warning">
        <div class="banner-icon">⚠️</div>
        <div class="banner-text">Multiple rods active — keep only <strong>one rod</strong> turned on at a time.</div>
      </div>
      <div class="auras-grid" id="rods-grid"></div>
    </div>

  <div class="card">
    <div class="card-title">Fish Sell Prices(They are currently not correct)</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fish</th>
            <th><span class="rarity-tag rarity-common">Sell Price</span><br><span style="font-size:9px;font-weight:500;color:var(--text-muted);text-transform:none;letter-spacing:0;"></span></th>
            <th>Qty</th>
            <th>Total Worth</th>
          </tr>
        </thead>
        <tbody id="drop-table-body"></tbody>
      </table>
    </div>
    <div class="sell-tools">
      <div class="bulk-controls">
        <button class="bulk-btn" id="clear-all-qty" type="button">Clear all</button>
      </div>
      <div class="sell-all-box">
        <span class="sell-all-label">Sell All Total</span>
        <span class="sell-all-value" id="sell-all-total">0</span>
      </div>
    </div>
  </div>

</div>

<script>

const UPGRADES = [
  { id: 'venus1',     label: 'Venus Sell Price 1',            sub: '',   on: true,  mult: 2    },

  { id: 'earth2',     label: 'Earth Sell Price 2',            sub: '',   on: true,  mult: 2    },

  { id: 'exoArt',     label: 'Exotic Artifact',               sub: '',   on: true,  mult: null },
  { id: 'rebirth35',  label: 'Rebirth 35',                    sub: '',   on: true,  mult: 2    },

function g(id) {
  return (UPGRADES.find(x => x.id === id) || AURAS.find(x => x.id === id))?.on || false;
}

function calcArtifactMult() {
  return Math.max(1 + (g('legArt') ? 3 : 0) + (g('mythArt') ? 5 : 0) + (g('exoArt') ? 8 : 0), 1);
}

function countActiveAuras() {
  return AURAS.filter(a => a.on).length;
}

function countActiveRods() {
  return RODS.filter(r => r.on).length;
}

function calcSellMultiplier() {
  if (countActiveAuras() > 1) return null;
  if (countActiveRods() > 1) return null;
  let r = 1;
  UPGRADES.forEach(u => { if (u.mult !== null) r *= Math.max(u.on ? u.mult : 0, 1); });
  AURAS.forEach(a => { r *= Math.max(a.on ? a.mult : 0, 1); });
  RODS.forEach(rod => { r *= Math.max(rod.on ? rod.mult : 0, 1); });
  r *= calcArtifactMult();
  return r;
}

function calcSellPrice(base, mult, dec) {
  if (mult === null || mult === 0) return '—';
  const v = base * mult;
  if (dec === 0) return Math.round(v).toLocaleString('en-US');
  return parseFloat(v.toFixed(dec)).toLocaleString('en-US');
}

function formatSellValue(value, dec) {
  if (value === null) return '—';
  if (dec === 0) return Math.round(value).toLocaleString('en-US');
  return parseFloat(value.toFixed(dec)).toLocaleString('en-US');
}

function calcSellAllTotal(mult) {
  if (mult === null || mult === 0) return null;
  let total = 0;
  FISH_SELL_PRICE.forEach(item => {
    const qty = Math.max(0, Math.floor(FISH_COUNTS[item.name] || 0));
    total += item.bases[0] * mult * qty;
  });
  return total;
}

function updateSellAllTotal(mult) {
  const totalEl = document.getElementById('sell-all-total');
  if (!totalEl) return;
  totalEl.textContent = formatSellValue(calcSellAllTotal(mult), 2);
}

function bindBulkControls() {
  const clearBtn = document.getElementById('clear-all-qty');
  if (!clearBtn || clearBtn.dataset.bound === '1') return;
  clearBtn.addEventListener('click', () => {
    FISH_SELL_PRICE.forEach(item => { FISH_COUNTS[item.name] = 0; });
    recalcAll();
  });
  clearBtn.dataset.bound = '1';
}

function renderUpgrades() {
  const el = document.getElementById('upgrades-grid');
  el.innerHTML = '';
  UPGRADES.forEach((u, i) => {
    let ml = '';
    if (u.id === 'legArt') ml = '+3.0 artifact';
    else if (u.id === 'mythArt') ml = '+5.0 artifact';
    else if (u.id === 'exoArt') ml = '+8.0 artifact';
    else if (u.mult) ml = '×' + u.mult;

    const row = document.createElement('div');
    row.className = 'upgrade-row' + (u.on ? '' : ' off-look');
    row.innerHTML = `<div><div class="upgrade-label">${u.label}</div>${u.sub ? `<div class="upgrade-sub">${u.sub}</div>` : ''}<div class="upgrade-mult">${ml}</div></div><div class="toggle ${u.on ? 'on' : 'off'}"></div>`;
    row.addEventListener('click', () => { UPGRADES[i].on = !UPGRADES[i].on; renderUpgrades(); recalcAll(); });
    el.appendChild(row);
  });
}

function renderAuras() {
  const el = document.getElementById('auras-grid');
  el.innerHTML = '';
  AURAS.forEach((a, i) => {
    const item = document.createElement('div');
    item.className = 'aura-item' + (a.on ? ' active' : '');
    const thumbContent = a.img ? `<img src="${a.img}" alt="${a.label}">` : (a.on ? '✦' : '');
    const imgClass = a.img ? ' has-img' : '';
    item.innerHTML = `<div class="aura-thumb${imgClass}">${thumbContent}</div><div class="aura-name">${a.label}</div><div class="aura-mult">×${a.mult}</div>`;
    item.addEventListener('click', () => {
      const wasOn = AURAS[i].on;
      AURAS.forEach((x, j) => { if (j !== i) x.on = false; });
      AURAS[i].on = !wasOn;
      renderAuras(); recalcAll();
    });
    el.appendChild(item);
  });
}

function renderRods() {
  const el = document.getElementById('rods-grid');
  el.innerHTML = '';
  RODS.forEach((r, i) => {
    const item = document.createElement('div');
    item.className = 'aura-item' + (r.on ? ' active' : '');
    const thumbContent = r.img ? `<img src="${r.img}" alt="${r.label}">` : (r.on ? '🎣' : '');
    const imgClass = r.img ? ' has-img' : '';
    item.innerHTML = `<div class="aura-thumb${imgClass}">${thumbContent}</div><div class="aura-name">${r.label}</div><div class="aura-mult">×${r.mult}</div>`;
    item.addEventListener('click', () => {
      const wasOn = RODS[i].on;
      RODS.forEach((x, j) => { if (j !== i) x.on = false; });
      RODS[i].on = !wasOn;
      renderRods(); recalcAll();
    });
    el.appendChild(item);
  });
}

function renderBanners() {
  const c = countActiveAuras();
  document.getElementById('aura-warning').classList.toggle('visible', c > 1);
  const rodCount = countActiveRods();
  document.getElementById('rod-warning').classList.toggle('visible', rodCount > 1);
}

function renderTable(mult) {
  const tb = document.getElementById('drop-table-body');
  tb.innerHTML = '';
  FISH_SELL_PRICE.forEach(item => {
    const tr = document.createElement('tr');
    if (item.rare) tr.style.background = '#ffffff';
    const baseValue = item.bases[0];
    const priceValue = (mult === null || mult === 0) ? null : baseValue * mult;
    const price = formatSellValue(priceValue);
    const quantity = Math.max(0, Math.floor(FISH_COUNTS[item.name] || 0));
    const totalValue = priceValue === null ? null : priceValue * quantity;
    const totalPrice = formatSellValue(totalValue);
    const rarityNameClass = item.rarity ? ` fish-name-rarity-${item.rarity}` : '';
    const rarityTag = item.rarity
      ? ` <span class="rarity-tag rarity-${item.rarity}">${item.rarity.charAt(0).toUpperCase() + item.rarity.slice(1)}</span>`
      : '';
    tr.innerHTML = `<td><span class="fish-name${rarityNameClass}">${item.name}</span>${rarityTag}</td><td>${price}</td><td><input class="fish-qty-input" type="number" min="0" step="1" value="${quantity}" aria-label="${item.name} quantity"></td><td class="fish-total">${totalPrice}</td>`;
    const qtyInput = tr.querySelector('.fish-qty-input');
    qtyInput.addEventListener('input', () => {
      const raw = Number(qtyInput.value);
      const nextQty = Number.isFinite(raw) && raw > 0 ? Math.floor(raw) : 0;
      FISH_COUNTS[item.name] = nextQty;
      qtyInput.value = String(nextQty);
      const nextTotal = priceValue === null ? null : priceValue * nextQty;
      tr.querySelector('.fish-total').textContent = formatSellValue(nextTotal);
      updateSellAllTotal(mult);
    });
    tb.appendChild(tr);
  });
}

function recalcAll() {
  renderBanners();
  const mult = calcSellMultiplier();
  renderTable(mult);
  updateSellAllTotal(mult);
}

function toggleTheme() {
  const html = document.documentElement;
  const tog = document.getElementById('theme-toggle');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    tog.className = 'toggle off';
  } else {
    html.setAttribute('data-theme', 'dark');
    tog.className = 'toggle on';
  }
}

renderUpgrades();
renderAuras();
renderRods();
bindBulkControls();
recalcAll();
</script>
</body>
</html>
